<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS50 Quiz — Join</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --dark: #0a0a0a;
    --card: #141414;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --green: #27ae60;
    --yellow: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; }

  header {
    background: var(--red);
    padding: 14px 24px;
    text-align: center;
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; }

  .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .screen.hidden { display: none !important; }

  /* Join screen */
  #join h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 8px; text-align: center; }
  #join p { color: var(--muted); font-size: 0.78rem; letter-spacing: 2px; text-align: center; margin-bottom: 32px; text-transform: uppercase; }

  .input-group { width: 100%; max-width: 360px; margin-bottom: 16px; }
  input {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 14px 18px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--red); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    max-width: 360px;
    background: var(--red);
    color: white;
    border: none;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 6px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error { color: #e74c3c; font-size: 0.78rem; margin-top: 8px; text-align: center; min-height: 20px; }

  /* Lobby waiting */
  #waiting { text-align: center; }
  #waiting h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 8px; }
  #waiting .name-display { color: var(--red); font-size: 1.1rem; margin-bottom: 32px; }
  .dots span {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    margin: 0 4px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* Question screen */
  #question { width: 100%; max-width: 600px; padding: 24px; }

  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-diff { font-size: 0.7rem; letter-spacing: 2px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
  .diff-easy { background: #1a3a2a; color: #27ae60; }
  .diff-medium { background: #3a2a1a; color: #f39c12; }
  .diff-hard { background: #3a1a1a; color: #e74c3c; }
  .diff-fun { background: #1a2a3a; color: #3498db; }

  .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--red); }
  .timer-display.warning { color: var(--yellow); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
    font-size: 1rem;
    line-height: 1.6;
    white-space: pre-line;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    padding: 16px 20px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.15s;
    line-height: 1.5;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--red); background: #1a0a0a; }
  .opt-btn .letter { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--red); min-width: 18px; line-height: 1; }
  .opt-btn.selected { border-color: var(--yellow); background: #2a2000; }
  .opt-btn.correct { border-color: var(--green); background: #0d2a1a; }
  .opt-btn.wrong { border-color: #e74c3c; background: #2a0d0d; opacity: 0.6; }
  .opt-btn:disabled { cursor: default; }

  /* Result */
  #result { text-align: center; }
  .result-icon { font-size: 4rem; margin-bottom: 16px; animation: popIn 0.4s ease; }
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
  #result h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 8px; }
  .score-gained { color: var(--green); font-size: 1rem; margin-bottom: 8px; }
  .total-score { color: var(--muted); font-size: 0.85rem; }
  .waiting-next { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 32px; }

  /* Final */
  #final { text-align: center; }
  #final h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; color: var(--red); margin-bottom: 16px; }
  .final-score { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; color: var(--text); line-height: 1; }
  .final-label { color: var(--muted); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
</style>
</head>
<body>
<header><h1>CS50 QUIZ</h1></header>

<!-- JOIN -->
<div class="screen" id="join">
  <h2>JOIN GAME</h2>
  <p>Enter the PIN your instructor shows on screen</p>
  <div class="input-group">
    <input type="text" id="pin-input" placeholder="Game PIN" maxlength="4" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
  </div>
  <div class="input-group">
    <input type="text" id="name-input" placeholder="Your name" maxlength="20">
  </div>
  <button class="btn" onclick="joinGame()">JOIN →</button>
  <div class="error" id="join-error"></div>
</div>

<!-- WAITING IN LOBBY -->
<div class="screen hidden" id="waiting">
  <h2>YOU'RE IN!</h2>
  <div class="name-display" id="waiting-name"></div>
  <div class="dots"><span></span><span></span><span></span></div>
  <p style="color:var(--muted); font-size:0.75rem; letter-spacing:2px; margin-top:20px; text-transform:uppercase;">Waiting for host to start...</p>
</div>

<!-- QUESTION -->
<div class="screen hidden" id="question">
  <div class="q-header">
    <span class="q-diff" id="p-diff"></span>
    <span class="timer-display" id="p-timer">20</span>
  </div>
  <div class="question-card" id="p-question"></div>
  <div class="options-list" id="p-options"></div>
</div>

<!-- RESULT AFTER ANSWERING -->
<div class="screen hidden" id="result">
  <div class="result-icon" id="result-icon">⏳</div>
  <h2 id="result-title">SUBMITTED!</h2>
  <div class="score-gained" id="score-gained"></div>
  <div class="total-score" id="total-score"></div>
  <div class="waiting-next">Waiting for host to reveal answer...</div>
</div>

<!-- FINAL SCREEN -->
<div class="screen hidden" id="final">
  <h2>GAME OVER!</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="final-label">TOTAL POINTS</div>
  <p style="color:var(--muted); font-size:0.8rem; margin-top:24px;">Check the big screen for the leaderboard! 🎉</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCb8eZ9utjASUTzuKF3ASGy08yQ0thnNJQ",
  authDomain: "cs50-quiz-2ef04.firebaseapp.com",
  databaseURL: "https://cs50-quiz-2ef04-default-rtdb.firebaseio.com",
  projectId: "cs50-quiz-2ef04",
  storageBucket: "cs50-quiz-2ef04.firebasestorage.app",
  messagingSenderId: "182771584867",
  appId: "1:182771584867:web:a3035fec9be32401358d56"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let uid = null;
let pin = null;
let myName = "";
let myScore = 0;
let currentQIdx = -1;
let questionOpenAt = null;
let answered = false;
let selectedChoice = null;
let timerInterval = null;
const TIMER_SECS = 20;

// Pre-fill PIN from URL
const urlPin = new URLSearchParams(location.search).get('pin');
if (urlPin) document.getElementById('pin-input').value = urlPin;

function show(id) {
  ['join','waiting','question','result','final'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

window.joinGame = async function() {
  const pinVal = document.getElementById('pin-input').value.trim();
  const nameVal = document.getElementById('name-input').value.trim();
  const err = document.getElementById('join-error');

  if (!pinVal || pinVal.length !== 4) { err.textContent = 'Enter a valid 4-digit PIN'; return; }
  if (!nameVal) { err.textContent = 'Enter your name'; return; }
  err.textContent = '';

  const gameSnap = await get(ref(db, `games/${pinVal}`));
  if (!gameSnap.exists()) { err.textContent = 'Game not found. Check your PIN.'; return; }
  const game = gameSnap.val();
  if (game.status === 'ended') { err.textContent = 'This game has already ended.'; return; }

  pin = pinVal;
  myName = nameVal;
  uid = `player_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;

  await set(ref(db, `games/${pin}/players/${uid}`), { name: myName, score: 0 });

  document.getElementById('waiting-name').textContent = myName;
  show('waiting');

  // Listen for game state changes
  onValue(ref(db, `games/${pin}`), snap => {
    const g = snap.val();
    if (!g) return;

    if (g.status === 'ended') { show('final'); document.getElementById('final-score').textContent = myScore; clearInterval(timerInterval); return; }

    if ((g.status === 'playing') && g.currentQ !== undefined && g.currentQ !== currentQIdx) {
      currentQIdx = g.currentQ;
      questionOpenAt = g.questionOpenAt || Date.now();
      answered = false;
      selectedChoice = null;
      const q = g.questions[currentQIdx];
      loadQuestion(q, currentQIdx);
    }

    if (g.status === 'revealed' && !answered) {
      // Time ran out, show result without points
      clearInterval(timerInterval);
      showResult(false, 0, null);
    }

    if (g.status === 'revealed' && answered) {
      // Highlight correct/wrong on question screen if still visible
      revealOnPlayer(g.correctAnswer);
    }

    // Update score from server
    if (g.players && g.players[uid]) {
      myScore = g.players[uid].score || 0;
    }
  });
}

function loadQuestion(q, idx) {
  clearInterval(timerInterval);
  answered = false;

  const diffEl = document.getElementById('p-diff');
  diffEl.textContent = (q.diff || 'easy').toUpperCase();
  diffEl.className = `q-diff diff-${q.diff}`;

  document.getElementById('p-question').textContent = q.q;

  const letters = ['A','B','C','D'];
  const optList = document.getElementById('p-options');
  optList.innerHTML = q.options.map((opt, i) =>
    `<button class="opt-btn" id="popt-${i}" onclick="chooseAnswer(${i})">
      <span class="letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`
  ).join('');

  show('question');
  startPlayerTimer();
}

function startPlayerTimer() {
  let t = TIMER_SECS;
  const timerEl = document.getElementById('p-timer');
  timerEl.textContent = t;
  timerEl.className = 'timer-display';

  timerInterval = setInterval(() => {
    t--;
    timerEl.textContent = t;
    if (t <= 5) timerEl.className = 'timer-display warning';
    if (t <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        answered = true;
        // Disable all buttons
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        showResult(false, 0, null);
      }
    }
  }, 1000);
}

window.chooseAnswer = function(choice) {
  if (answered) return;
  answered = true;
  selectedChoice = choice;
  clearInterval(timerInterval);

  const timeTaken = (Date.now() - questionOpenAt) / 1000;

  // Highlight selection
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === choice) b.classList.add('selected');
  });

  // Submit to Firebase
  set(ref(db, `games/${pin}/answers/${currentQIdx}/${uid}`), {
    choice,
    timeTaken: Math.round(timeTaken * 10) / 10
  });

  showResult(null, 0, choice); // null = pending reveal
}

function showResult(isCorrect, pts, choice) {
  if (isCorrect === null) {
    // Waiting for reveal
    document.getElementById('result-icon').textContent = '⏳';
    document.getElementById('result-title').textContent = 'ANSWER LOCKED IN!';
    document.getElementById('score-gained').textContent = '';
    document.getElementById('total-score').textContent = `Current score: ${myScore} pts`;
    show('result');
  } else if (isCorrect === false) {
    document.getElementById('result-icon').textContent = '😬';
    document.getElementById('result-title').textContent = "TIME'S UP!";
    document.getElementById('score-gained').textContent = '+0 points';
    document.getElementById('total-score').textContent = `Current score: ${myScore} pts`;
    show('result');
  }
}

function revealOnPlayer(correctAnswer) {
  // If on result screen, update it
  if (!document.getElementById('result').classList.contains('hidden')) {
    if (selectedChoice !== null) {
      const isCorrect = (correctAnswer === -1) || (selectedChoice === correctAnswer);
      document.getElementById('result-icon').textContent = isCorrect ? '🎉' : '😞';
      document.getElementById('result-title').textContent = isCorrect ? 'CORRECT!' : 'WRONG!';
      document.getElementById('total-score').textContent = `Score: ${myScore} pts`;
    }
  }
}
</script>
</body>
</html>
